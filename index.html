<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PDR センサーテスト</title>
</head>

<body>

<h2>PDR センサーテスト</h2>

<button onclick="requestPermission()">センサテスト開始</button>

<h3>向き</h3>
<p id="heading">未開始</p>

<h3>加速度</h3>
<p>X：<span id="accX">0</span></p>
<p>Y：<span id="accY">0</span></p>
<p>Z：<span id="accZ">0</span></p>

<h3>歩数</h3>
<p>合成加速度：<span id="magnitude">0</span></p>
<p>歩数：<span id="step">0</span></p>

<h3>現在位置</h3>
<p>X：<span id="posX">0.00</span> m</p>
<p>Y：<span id="posY">0.00</span> m</p>

<script src="script.js"></script>

</body>
</html>
